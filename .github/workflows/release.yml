name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: npm-release
  cancel-in-progress: false

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify publish manifests
        run: pnpm run release:verify-manifests

      - name: Check release readiness
        id: readiness
        env:
          npm_config_cache: ${{ runner.temp }}/.npm
        run: pnpm run release:check-readiness

      - name: Build
        if: steps.readiness.outputs.publish_any == 'true'
        run: pnpm build

      - name: Publish @connextable/popbill-spec
        if: steps.readiness.outputs.publish_popbill_spec == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm -C packages/popbill-spec publish --access public --no-git-checks

      - name: Publish @connextable/popbill-utils
        if: steps.readiness.outputs.publish_popbill_utils == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm -C packages/popbill-utils publish --access public --no-git-checks

      - name: Publish @connextable/popbill-runtime
        if: steps.readiness.outputs.publish_popbill_runtime == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm -C packages/popbill-runtime publish --access public --no-git-checks

      - name: Publish @connextable/popbill-juso
        if: steps.readiness.outputs.publish_popbill_juso == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm -C packages/popbill-juso publish --access public --no-git-checks

      - name: Publish @connextable/popbill-compat
        if: steps.readiness.outputs.publish_popbill_compat == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm -C packages/popbill-compat publish --access public --no-git-checks

      - name: Publish @connextable/popbill
        if: steps.readiness.outputs.publish_popbill == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm -C packages/popbill publish --access public --no-git-checks

      - name: Release summary
        run: |
          echo "version=${{ steps.readiness.outputs.version }}"
          echo "publish_juso=${{ steps.readiness.outputs.publish_popbill_juso }}"
          echo "publish_spec=${{ steps.readiness.outputs.publish_popbill_spec }}"
          echo "publish_utils=${{ steps.readiness.outputs.publish_popbill_utils }}"
          echo "publish_runtime=${{ steps.readiness.outputs.publish_popbill_runtime }}"
          echo "publish_compat=${{ steps.readiness.outputs.publish_popbill_compat }}"
          echo "publish_popbill=${{ steps.readiness.outputs.publish_popbill }}"
